services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.http.address=:80"
      - "--entrypoints.https.address=:443"
      - "--entrypoints.http.http.redirections.entrypoint.to=https"
      - "--entrypoints.http.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.email=leon.stuempeley@gmx.de"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=http"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/acme.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.sahgame.de`)"
      - "traefik.http.routers.dashboard.entrypoints=https"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$eHoTKtFr$$fflhAopslKBsSCkMHyA3f."

  pro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pro.rule=Host(`api.sahgame.de`)"
      - "traefik.http.routers.pro.entrypoints=https"
      - "traefik.http.routers.pro.tls.certresolver=le"
      - "traefik.http.services.pro.loadbalancer.server.port=5000"

  pro_fr:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pro_fr
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pro_fr.rule=Host(`sahgame.de`)"
      - "traefik.http.routers.pro_fr.entrypoints=https"
      - "traefik.http.routers.pro_fr.tls.certresolver=le"
      - "traefik.http.services.pro_fr.loadbalancer.server.port=4173"

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.sahgame.de`)"
      - "traefik.http.routers.grafana.entrypoints=https"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /:/host:ro,rslave

  blackbox-exporter:
    image: prom/blackbox-exporter
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    configs:
      - source: blackbox_config
        target: /etc/blackbox_exporter/config.yml

  loki:
    image: grafana/loki
    container_name: loki
    restart: unless-stopped
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    volumes:
      - loki_data:/loki
    configs:
      - source: loki_config
        target: /etc/loki/loki-config.yml

  alloy:
    image: grafana/alloy
    container_name: alloy
    restart: unless-stopped
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "/etc/alloy/config.alloy"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    configs:
      - source: alloy_config
        target: /etc/alloy/config.alloy

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  alloy_data:

configs:
  grafana_datasources:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100

  prometheus_config:
    content: |
      global:
        scrape_interval: 30s
      scrape_configs:
        - job_name: prometheus
          static_configs:
            - targets:
                - prometheus:9090
        - job_name: node-exporter
          static_configs:
            - targets:
                - node-exporter:9100
        - job_name: uptime
          metrics_path: /probe
          params:
            module:
              - http_2xx
          static_configs:
            - targets:
                - https://sahgame.de
                - https://api.sahgame.de
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: blackbox-exporter:9115

  blackbox_config:
    content: |
      modules:
        http_2xx:
          prober: http
          timeout: 5s
          http:
            method: GET
            follow_redirects: true
            preferred_ip_protocol: ip4

  loki_config:
    content: |
      auth_enabled: false
      server:
        http_listen_port: 3100
        log_level: info
      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory
      schema_config:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 168h
        allow_structured_metadata: true
      compactor:
        working_directory: /loki/compactor
        retention_enabled: true
        delete_request_store: filesystem
      analytics:
        reporting_enabled: false

  alloy_config:
    content: |
      discovery.docker "containers" {
        host             = "unix:///var/run/docker.sock"
        refresh_interval = "10s"
      }

      discovery.relabel "containers" {
        targets = discovery.docker.containers.targets

        rule {
          source_labels = ["__meta_docker_container_name"]
          regex         = "/?(.*)"
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_docker_container_log_stream"]
          target_label  = "stream"
        }

        rule {
          source_labels = ["__meta_docker_container_label_com_docker_compose_service"]
          target_label  = "compose_service"
        }

        rule {
          source_labels = ["__meta_docker_container_label_com_docker_compose_project"]
          target_label  = "compose_project"
        }
      }

      loki.source.docker "containers" {
        host             = "unix:///var/run/docker.sock"
        targets          = discovery.relabel.containers.output
        labels           = { source = "docker" }
        forward_to       = [loki.write.local.receiver]
        refresh_interval = "10s"
      }

      loki.write "local" {
        endpoint {
          url = "http://loki:3100/loki/api/v1/push"
        }
      }
